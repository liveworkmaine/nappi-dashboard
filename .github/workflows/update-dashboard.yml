name: Update Dashboard

on:
  schedule:
    # Run at 10:30 PM ET (02:30 UTC) every weekday
    # Nappi reports arrive by ~6 PM ET; the Gmail→Drive script runs shortly after
    - cron: '30 2 * * 1-5'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch new reports and rebuild dashboard
        id: fetch
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python fetch_from_drive.py

      - name: Commit and push changes
        if: steps.fetch.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ text/ dashboard.html
          git commit -m "Update dashboard data $(date -u +%Y-%m-%d)"
          git push

