// ═══════ DAILY MOVEMENT CHART (replaces original) ═══════
var dmState = {from:'', to:'', preset:'30d'};

  function getAllDates(){
    return (typeof DASH!=='undefined' && DASH.dates) ? DASH.dates.slice() : [];
  }

  function getFilteredDates(){
    var all = getAllDates();
    if(!all.length) return all;
    if(dmState.preset==='all') return all;
    if(dmState.preset==='custom' && dmState.from && dmState.to){
      return all.filter(function(d){return d>=dmState.from && d<=dmState.to;});
    }
    // Numeric presets: 7d, 14d, 30d
    var days = parseInt(dmState.preset)||30;
    var last = all[all.length-1];
    var cutoff = new Date(last+'T12:00:00');
    cutoff.setDate(cutoff.getDate()-days+1);
    var cutStr = cutoff.toISOString().slice(0,10);
    return all.filter(function(d){return d>=cutStr;});
  }

  function computeDaily(dates){
    // For each date, compute total daily movement in CE across all products
    // a_mtd is cumulative within a month; daily = delta from prev same-month date
    var result = [];
    var products = (typeof DASH!=='undefined') ? DASH.products : {};
    dates.forEach(function(date, di){
      var totalCaseCE=0, totalKegCE=0, byProduct=[];
      Object.keys(products).forEach(function(sku){
        var p = products[sku];
        var tr = p.trend||[];
        var cur = null, prev = null;
        for(var i=0;i<tr.length;i++){
          if(tr[i].d===date){cur=tr[i]; if(i>0) prev=tr[i-1]; break;}
        }
        if(!cur) return;
        var mtdNow = cur.a_mtd||0;
        var mtdPrev = 0;
        if(prev){
          // If same month, delta from previous; if month changed, full mtd is the daily
          if(prev.d.slice(0,7)===date.slice(0,7)){
            mtdPrev = prev.a_mtd||0;
          }
        }
        var daily = mtdNow - mtdPrev;
        if(daily<0) daily = mtdNow; // month reset safety
        var ce = daily * (p.ce_factor||1);
        if(cur.a_unit==='kegs'){totalKegCE+=ce;} else {totalCaseCE+=ce;}
        if(daily>0) byProduct.push({name:p.name,format:p.format,daily:daily,ce:ce,unit:cur.a_unit});
      });
      result.push({d:date, caseCE:totalCaseCE, kegCE:totalKegCE, total:totalCaseCE+totalKegCE, byProduct:byProduct});
    });
    return result;
  }

  function fmtDate(d){
    var dt=new Date(d+'T12:00:00');
    var mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return mn[dt.getMonth()]+' '+dt.getDate();
  }
  function fmtDay(d){
    var dt=new Date(d+'T12:00:00');
    return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][dt.getDay()];
  }

    // Totals for the period
    var sumCaseCE=0, sumKegCE=0;
    daily.forEach(function(r){sumCaseCE+=r.caseCE; sumKegCE+=r.kegCE;});
    var sumTotal = sumCaseCE+sumKegCE;
    var avgDaily = dates.length>0 ? sumTotal/dates.length : 0;

    // Build HTML

    ['7d','14d','30d','all'].forEach(function(p){

      var allDates = getAllDates();
      var minD = allDates[0]||'';
      var maxD = allDates[allDates.length-1]||'';
      h+='<div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap">';
      h+='<label style="font-size:11px;color:var(--text2)">From</label>';
      h+='<input type="date" id="dmFrom" value="'+(dmState.from||minD)+'" min="'+minD+'" max="'+maxD+'" onchange="dmCustomChange()" style="padding:4px 8px;border:1px solid var(--border);border-radius:4px;font-size:12px;font-family:var(--font-mono)">';
      h+='<label style="font-size:11px;color:var(--text2)">To</label>';
      h+='<input type="date" id="dmTo" value="'+(dmState.to||maxD)+'" min="'+minD+'" max="'+maxD+'" onchange="dmCustomChange()" style="padding:4px 8px;border:1px solid var(--border);border-radius:4px;font-size:12px;font-family:var(--font-mono)">';
      h+='</div>';
    }

    // KPI row
    h+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:14px">';
    var kpis = [
      {v:sumTotal.toFixed(1), l:'Total CE', c:'var(--blue)'},
      {v:sumCaseCE.toFixed(1), l:'Cases (CE)', c:'var(--blue)'},
      {v:sumKegCE.toFixed(1), l:'Kegs (CE)', c:'#6b46c1'},
      {v:avgDaily.toFixed(1), l:'Avg/Day', c:'var(--green)'},
      {v:dates.length, l:'Days', c:'var(--text2)'}
    ];
    kpis.forEach(function(k){
      h+='<div style="background:var(--surface2,#edeae4);border-radius:6px;padding:8px 10px;text-align:center">';
      h+='<div style="font-family:var(--font-mono);font-size:18px;font-weight:700;color:'+k.c+'">'+k.v+'</div>';
      h+='<div style="font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px">'+k.l+'</div>';
      h+='</div>';
    });
    h+='</div>';

    // SVG bar chart
    var maxCE = Math.max(1, Math.max.apply(null, daily.map(function(r){return r.total;})));
    var W=920, barArea=200, pad={l:44,r:16,t:8,b:30};
    var pw = W-pad.l-pad.r;
    var bw = Math.max(6, Math.min(28, (pw/(daily.length))*0.7));
    var gap = (pw - bw*daily.length) / Math.max(1, daily.length);
    var H = barArea+pad.t+pad.b;

    h+='<div style="overflow-x:auto"><svg viewBox="0 0 '+W+' '+H+'" style="width:100%;max-height:260px;min-height:180px">';
    // Grid lines
    for(var gi=0;gi<=4;gi++){
      var gy = pad.t + barArea*(1-gi/4);
      var gv = (maxCE*gi/4).toFixed(1);
      h+='<line x1="'+pad.l+'" y1="'+gy+'" x2="'+(W-pad.r)+'" y2="'+gy+'" stroke="var(--border)" stroke-width="0.5"/>';
      h+='<text x="'+(pad.l-4)+'" y="'+(gy+3)+'" fill="var(--text2)" font-size="8" text-anchor="end" font-family="var(--font-mono)">'+gv+'</text>';
    }
    // Avg line
    var avgY = pad.t + barArea*(1-avgDaily/maxCE);
    h+='<line x1="'+pad.l+'" y1="'+avgY+'" x2="'+(W-pad.r)+'" y2="'+avgY+'" stroke="var(--green)" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>';
    h+='<text x="'+(W-pad.r+2)+'" y="'+(avgY+3)+'" fill="var(--green)" font-size="8" font-family="var(--font-mono)">avg</text>';

    // Bars
    daily.forEach(function(r, i){
      var cx = pad.l + i*(bw+gap) + gap/2 + bw/2;
      var totalH = (r.total/maxCE)*barArea;
      var caseH = (r.caseCE/maxCE)*barArea;
      var kegH = (r.kegCE/maxCE)*barArea;
      var baseY = pad.t + barArea;
      // Cases portion (bottom)
      if(caseH>0.5){
        h+='<rect x="'+(cx-bw/2)+'" y="'+(baseY-caseH)+'" width="'+bw+'" height="'+caseH+'" fill="#2c5282" rx="1" opacity="0.85">';
        h+='<title>'+fmtDay(r.d)+' '+fmtDate(r.d)+'  Cases: '+r.caseCE.toFixed(1)+' CE</title></rect>';
      }
      // Kegs portion (stacked on top)
      if(kegH>0.5){
        h+='<rect x="'+(cx-bw/2)+'" y="'+(baseY-caseH-kegH)+'" width="'+bw+'" height="'+kegH+'" fill="#6b46c1" rx="1" opacity="0.85">';
        h+='<title>'+fmtDay(r.d)+' '+fmtDate(r.d)+'  Kegs: '+r.kegCE.toFixed(1)+' CE</title></rect>';
      }
      // Date label (show every N)
      var showLabel = daily.length<=14 || i%Math.ceil(daily.length/12)===0 || i===daily.length-1;
      if(showLabel){
        h+='<text x="'+cx+'" y="'+(H-4)+'" fill="var(--text2)" font-size="7.5" text-anchor="middle" font-family="var(--font-body)">'+fmtDate(r.d)+'</text>';
      }
      // Touch/click target
      h+='<rect x="'+(cx-bw/2-gap/2)+'" y="'+pad.t+'" width="'+(bw+gap)+'" height="'+barArea+'" fill="transparent" style="cursor:pointer" onclick="dmShowDay('+i+')"/>';
    });
    h+='</svg></div>';

    // Legend
    h+='<div style="display:flex;gap:16px;font-size:10px;color:var(--text2);margin-top:4px">';
    h+='<span style="display:inline-flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:#2c5282;border-radius:2px"></span>Cases (CE)</span>';
    h+='<span style="display:inline-flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:#6b46c1;border-radius:2px"></span>Kegs (CE)</span>';
    h+='<span style="display:inline-flex;align-items:center;gap:4px"><span style="width:10px;height:3px;background:var(--green);border-radius:1px"></span>Daily Avg</span>';
    h+='</div>';

    // Day detail panel (populated on click)
    h+='<div id="dmDayDetail" style="margin-top:10px"></div>';

    // Product sparklines (top movers)
    var productTotals = {};
    daily.forEach(function(r){
      r.byProduct.forEach(function(bp){
        var key = bp.name+' '+bp.format;
        if(!productTotals[key]) productTotals[key]={name:bp.name,format:bp.format,ce:0,unit:bp.unit};
        productTotals[key].ce += bp.ce;
      });
    });
    var sorted = Object.values(productTotals).sort(function(a,b){return b.ce-a.ce;});
    if(sorted.length>0){
      h+='<div style="margin-top:14px;border-top:1px solid var(--border);padding-top:10px">';
      h+='<div style="font-family:var(--font-display);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:8px">Top Movers (Period Total CE)</div>';
      h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px">';
      sorted.slice(0,10).forEach(function(p){
        var pct = sumTotal>0 ? (p.ce/sumTotal*100).toFixed(0) : 0;
        var barW = sumTotal>0 ? Math.max(2, p.ce/sorted[0].ce*100) : 0;
        var color = p.unit==='kegs'?'#6b46c1':'#2c5282';
        h+='<div style="font-size:11px;padding:4px 0">';
        h+='<div style="display:flex;justify-content:space-between;margin-bottom:2px"><span style="font-weight:600">'+p.name+'</span><span style="font-family:var(--font-mono);color:'+color+'">'+p.ce.toFixed(1)+' CE</span></div>';
        h+='<div style="height:4px;background:var(--surface2);border-radius:2px"><div style="height:4px;width:'+barW+'%;background:'+color+';border-radius:2px"></div></div>';
        h+='<div style="font-size:9px;color:var(--text2)">'+p.format+' &middot; '+pct+'%</div>';
        h+='</div>';
      });
      h+='</div></div>';
    }

    h+='</div>';
    el.innerHTML = h;

    // Store daily data for click handler
    window._dmDaily = daily;
  };

  // Click handler for day detail
  function dmShowDay(idx){
    var daily = window._dmDaily;
    if(!daily||!daily[idx]) return;
    var r = daily[idx];
    var el = document.getElementById('dmDayDetail');
    if(!el) return;
    var h = '<div style="background:var(--surface2);border-radius:6px;padding:10px 12px;font-size:12px">';
    h+='<div style="font-family:var(--font-display);font-size:12px;font-weight:600;margin-bottom:6px">'+fmtDay(r.d)+', '+fmtDate(r.d)+' &mdash; '+r.total.toFixed(1)+' CE</div>';
    if(r.byProduct.length===0){h+='<div style="color:var(--text2)">No movement recorded</div>';}
    else{
      r.byProduct.sort(function(a,b){return b.ce-a.ce;});
      h+='<div style="display:grid;grid-template-columns:1fr auto auto;gap:2px 12px">';
      h+='<div style="font-weight:600;color:var(--text2);font-size:10px">Product</div><div style="font-weight:600;color:var(--text2);font-size:10px;text-align:right">Units</div><div style="font-weight:600;color:var(--text2);font-size:10px;text-align:right">CE</div>';
      r.byProduct.forEach(function(bp){
        h+='<div>'+bp.name+' <span style="color:var(--text2)">'+bp.format+'</span></div>';
        h+='<div style="text-align:right;font-family:var(--font-mono)">'+bp.daily+'</div>';
        h+='<div style="text-align:right;font-family:var(--font-mono);color:'+(bp.unit==='kegs'?'#6b46c1':'#2c5282')+'">'+bp.ce.toFixed(1)+'</div>';
      });
      h+='</div>';
    }
    h+='</div>';
    el.innerHTML = h;
  }

  // Preset & custom date handlers
  function dmSetPreset(p){
    dmState.preset = p;
    if(p!=='custom'){dmState.from='';dmState.to='';}
    else{
      var all=getAllDates();
      if(all.length){dmState.from=all[0];dmState.to=all[all.length-1];}
    }
    renderSummaryChart();
  }
  function dmCustomChange(){
    var f=document.getElementById('dmFrom'), t=document.getElementById('dmTo');
    if(f)dmState.from=f.value;
    if(t)dmState.to=t.value;
    renderSummaryChart();
  }



try {
  renderSummaryChart();
  dbg.textContent += '\nChart rendered OK!';
} catch(e) {
  dbg.textContent += '\nERROR: ' + e.message + '\n' + e.stack;
  document.getElementById('summaryChart').innerHTML = '<div style="color:red;padding:16px">Error: ' + e.message + '</div>';
}
</script></body></html>
