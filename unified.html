<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Deck Brewing — Brew Queue</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f0e8;
  --surface: #fffdf8;
  --surface2: #f0ebe0;
  --border: #d9d0c0;
  --text1: #1a1612;
  --text2: #6b5f50;
  --text3: #9b8e7d;
  --accent: #2c5530;
  --accent2: #4a7c4f;
  --red: #c93c37;
  --red-bg: #fef0ef;
  --red-border: #f5c6c4;
  --orange: #c67a1a;
  --orange-bg: #fef6ec;
  --orange-border: #f0d8a8;
  --green: #2c7a3a;
  --green-bg: #eef8ef;
  --blue: #2a5a9b;
  --blue-bg: #edf3fc;
  --purple: #6b4fa0;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'DM Sans', -apple-system, sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text1);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ── */
.header {
  background: var(--text1);
  color: var(--bg);
  padding: 20px 24px;
}
.header h1 {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.header .sub {
  font-size: 12px;
  color: #a09585;
  margin-top: 2px;
  font-family: var(--mono);
}

/* ── KPI strip ── */
.kpi-strip {
  display: flex;
  gap: 1px;
  background: var(--border);
  border-bottom: 1px solid var(--border);
}
.kpi-card {
  flex: 1;
  background: var(--surface);
  padding: 14px 16px;
  text-align: center;
}
.kpi-card .val {
  font-size: 26px;
  font-weight: 700;
  font-family: var(--mono);
  line-height: 1.1;
}
.kpi-card .lbl {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text2);
  margin-top: 2px;
}
.kpi-card.urgent .val { color: var(--red); }
.kpi-card.warn .val { color: var(--orange); }
.kpi-card.ok .val { color: var(--green); }

/* ── Season bar ── */
.season-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  color: var(--text2);
  overflow-x: auto;
}
.season-bar .mo {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 36px;
}
.season-bar .mo .bar {
  width: 24px;
  background: var(--accent2);
  border-radius: 2px;
  opacity: 0.4;
  transition: opacity 0.2s;
}
.season-bar .mo.now .bar { opacity: 1; background: var(--accent); }
.season-bar .mo .mlbl {
  font-size: 9px;
  font-family: var(--mono);
  margin-top: 2px;
  text-transform: uppercase;
}
.season-lbl {
  font-weight: 600;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  white-space: nowrap;
  margin-right: 4px;
}

/* ── Table ── */
.table-wrap {
  padding: 0;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
thead th {
  position: sticky;
  top: 0;
  background: var(--surface2);
  padding: 10px 12px;
  text-align: left;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text2);
  border-bottom: 2px solid var(--border);
  white-space: nowrap;
  z-index: 2;
}
thead th.r { text-align: right; }
tbody tr {
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
}
tbody tr:hover { background: var(--surface2); }
tbody tr.expanded { background: var(--surface); border-bottom: none; }
td {
  padding: 10px 12px;
  vertical-align: middle;
}
td.r { text-align: right; font-family: var(--mono); font-size: 12px; }
td.name-cell {
  font-weight: 600;
}
td .pkg {
  font-size: 11px;
  color: var(--text3);
  font-weight: 400;
}
td .style-tag {
  font-size: 10px;
  color: var(--text3);
  font-style: italic;
}

/* Status chips */
.chip {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 600;
  font-family: var(--mono);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.chip.brew-now { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
.chip.plan { background: var(--orange-bg); color: var(--orange); border: 1px solid var(--orange-border); }
.chip.ok { background: var(--green-bg); color: var(--green); border: 1px solid #c4e0c6; }

/* Trend arrow */
.trend-up { color: var(--red); }
.trend-down { color: var(--green); }
.trend-flat { color: var(--text3); }

/* ── Expand row ── */
.detail-row { display: none; }
.detail-row.show { display: table-row; }
.detail-row td {
  padding: 0;
  border-bottom: 1px solid var(--border);
}
.detail-panel {
  padding: 16px 20px 20px;
  background: var(--surface);
  border-top: 1px dashed var(--border);
}
.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
}
.detail-section h4 {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text3);
  margin-bottom: 8px;
  font-weight: 600;
}
.detail-section .row {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  padding: 3px 0;
  border-bottom: 1px solid var(--surface2);
}
.detail-section .row .rlbl { color: var(--text2); }
.detail-section .row .rval { font-family: var(--mono); font-weight: 500; }

/* Channel bar */
.ch-bar {
  display: flex;
  height: 8px;
  border-radius: 4px;
  overflow: hidden;
  margin: 6px 0;
}
.ch-bar .seg { transition: width 0.3s; }
.ch-bar .nappi { background: var(--accent); }
.ch-bar .toast { background: var(--orange); }
.ch-bar .sd { background: var(--blue); }
.ch-bar .mmm { background: var(--purple); }
.ch-legend {
  display: flex;
  gap: 12px;
  font-size: 10px;
  color: var(--text2);
}
.ch-legend .dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 2px;
  margin-right: 3px;
  vertical-align: middle;
}

/* Mini velocity sparkline */
.spark {
  display: flex;
  align-items: flex-end;
  gap: 1px;
  height: 28px;
}
.spark .bar {
  flex: 1;
  background: var(--accent2);
  border-radius: 1px 1px 0 0;
  opacity: 0.5;
  min-width: 3px;
}
.spark .bar.recent { opacity: 1; background: var(--accent); }

/* Allocation box */
.alloc-box {
  background: var(--surface2);
  border-radius: 4px;
  padding: 10px 12px;
  font-size: 12px;
  margin-top: 8px;
}
.alloc-box .ab-title {
  font-weight: 600;
  font-size: 11px;
  margin-bottom: 6px;
}

/* Footer */
.footer {
  text-align: center;
  padding: 20px;
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* Auth gate */
.auth-gate {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  background: var(--bg);
}
.auth-box {
  text-align: center;
}
.auth-box h2 {
  font-size: 16px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 16px;
}
.auth-box input {
  font-family: var(--mono);
  padding: 10px 16px;
  border: 2px solid var(--border);
  border-radius: 4px;
  font-size: 14px;
  background: var(--surface);
  outline: none;
  width: 200px;
}
.auth-box input:focus { border-color: var(--accent); }
.auth-box .err { color: var(--red); font-size: 12px; margin-top: 8px; display: none; }
.main-app { display: none; }

/* Responsive */
@media (max-width: 768px) {
  .kpi-strip { flex-wrap: wrap; }
  .kpi-card { min-width: 33%; }
  .detail-grid { grid-template-columns: 1fr; }
  td, th { padding: 8px 8px; font-size: 12px; }
  .header { padding: 16px; }
}
</style>
</head>
<body>

<!-- Auth Gate -->
<div class="auth-gate" id="authGate">
  <div class="auth-box">
    <h2>Flight Deck Brewing</h2>
    <div><input type="password" id="passwordInput" placeholder="Enter PIN" autofocus></div>
    <div class="err" id="errorMsg">Incorrect PIN</div>
  </div>
</div>

<!-- Main App -->
<div class="main-app" id="mainApp">
  <div class="header">
    <h1>Brew Queue</h1>
    <div class="sub" id="freshness"></div>
  </div>

  <div class="kpi-strip" id="kpiStrip"></div>
  <div class="season-bar" id="seasonBar"></div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:28px">#</th>
          <th>Beer</th>
          <th>Status</th>
          <th class="r">Days Left</th>
          <th class="r">Brew By</th>
          <th class="r">Velocity</th>
          <th>Trend</th>
        </tr>
      </thead>
      <tbody id="queueBody"></tbody>
    </table>
  </div>
  <div class="footer">Flight Deck Brewing &middot; Mission Control</div>
</div>

": 2}]};
const FRESHNESS = {"nappi": "2026-04-02", "inventory": "N/A", "toast": "N/A", "selfdistro": "N/A", "toast_month": "N/A", "selfdistro_month": "N/A"};
const LATEST = "2026-04-02";

// ── Auth ──
(function(){
  var pin = '1903';
  var inp = document.getElementById('passwordInput');
  var err = document.getElementById('errorMsg');
  inp.addEventListener('keydown', function(e){
    if(e.key==='Enter'){
      if(inp.value===pin){
        document.getElementById('authGate').style.display='none';
        document.getElementById('mainApp').style.display='block';
        renderAll();
      } else {
        err.style.display='block';
        inp.value='';
      }
    }
  });
})();

function renderAll(){
  renderFreshness();
  renderKPIs();
  renderSeasonBar();
  renderQueue();
}

function renderFreshness(){
  var d = LATEST;
  document.getElementById('freshness').textContent = 'Data as of ' + d + '  \u00b7  Nappi: ' + (FRESHNESS.nappi||'?');
}

// ── KPIs ──
function renderKPIs(){
  var brewNow = 0, plan = 0, ok = 0, avgDays = 0, cnt = 0;
  BRANDS.forEach(function(b){
    if(b.brew_status === 'BREW_NOW') brewNow++;
    else if(b.brew_status === 'PLAN' || b.brew_status === 'ORDER_SOON') plan++;
    else ok++;
    if(b.days_until_stockout < 900){ avgDays += b.days_until_stockout; cnt++; }
  });
  avgDays = cnt ? Math.round(avgDays / cnt) : 0;

  // upcoming seasonal multiplier
  var now = new Date();
  var nextMo = String(((now.getMonth()+1) % 12) + 1).padStart(2,'0');
  var curMo = String(now.getMonth()+1).padStart(2,'0');
  var sNow = SEASONAL[curMo] || 1;
  var sNext = SEASONAL[nextMo] || 1;
  var seasonTrend = sNext > sNow ? '\u2191' : sNext < sNow ? '\u2193' : '\u2192';

  var el = document.getElementById('kpiStrip');
  el.innerHTML =
    '<div class="kpi-card urgent"><div class="val">' + brewNow + '</div><div class="lbl">Brew Now</div></div>' +
    '<div class="kpi-card warn"><div class="val">' + plan + '</div><div class="lbl">Plan Soon</div></div>' +
    '<div class="kpi-card ok"><div class="val">' + ok + '</div><div class="lbl">On Track</div></div>' +
    '<div class="kpi-card"><div class="val">' + avgDays + 'd</div><div class="lbl">Avg Days Left</div></div>' +
    '<div class="kpi-card"><div class="val">' + sNow.toFixed(2) + seasonTrend + '</div><div class="lbl">Season Index</div></div>';
}

// ── Season bar ──
function renderSeasonBar(){
  var months = ['01','02','03','04','05','06','07','08','09','10','11','12'];
  var labels = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var maxVal = Math.max.apply(null, months.map(function(m){ return SEASONAL[m]||0; }));
  var curMo = String(new Date().getMonth()+1).padStart(2,'0');

  var h = '<span class="season-lbl">Seasonal Demand</span>';
  months.forEach(function(m, idx){
    var v = SEASONAL[m] || 0;
    var ht = Math.round((v / maxVal) * 32);
    var cls = m === curMo ? ' now' : '';
    h += '<div class="mo' + cls + '"><div class="bar" style="height:' + ht + 'px"></div><div class="mlbl">' + labels[idx] + '</div></div>';
  });
  document.getElementById('seasonBar').innerHTML = h;
}

// ── Queue table ──
function renderQueue(){
  // Sort by priority_rank
  var sorted = BRANDS.slice().sort(function(a,b){ return a.priority_rank - b.priority_rank; });
  var body = document.getElementById('queueBody');
  var html = '';

  sorted.forEach(function(b, idx){
    var rank = idx + 1;
    var statusCls = b.brew_status === 'BREW_NOW' ? 'brew-now' : (b.brew_status === 'PLAN' || b.brew_status === 'ORDER_SOON') ? 'plan' : 'ok';
    var statusLabel = b.brew_status === 'BREW_NOW' ? 'Brew Now' : b.brew_status === 'PLAN' ? 'Plan' : b.brew_status === 'ORDER_SOON' ? 'Order Soon' : 'OK';
    var daysLeft = b.days_until_stockout >= 900 ? '\u221e' : b.days_until_stockout;
    var daysCls = b.days_until_stockout < 7 ? ' style="color:var(--red);font-weight:700"' :
                  b.days_until_stockout < 21 ? ' style="color:var(--orange);font-weight:600"' : '';
    var vel = b.total_daily_bbl.toFixed(3);
    var trendIcon = b.trailing_3mo_trend === 'up' ? '<span class="trend-up">\u25b2</span>' :
                    b.trailing_3mo_trend === 'down' ? '<span class="trend-down">\u25bc</span>' :
                    '<span class="trend-flat">\u25b6</span>';

    // format brew_by nicely
    var brewBy = b.brew_by_date || '\u2014';
    if(brewBy !== '\u2014'){
      var parts = brewBy.split('-');
      brewBy = parts[1] + '/' + parts[2];
    }

    html += '<tr onclick="toggleDetail(this,' + idx + ')" id="row' + idx + '">' +
      '<td style="color:var(--text3);font-family:var(--mono);font-size:11px">' + rank + '</td>' +
      '<td class="name-cell">' + b.display_name + '<br><span class="pkg">' + b.style + '</span></td>' +
      '<td><span class="chip ' + statusCls + '">' + statusLabel + '</span></td>' +
      '<td class="r"' + daysCls + '>' + daysLeft + '</td>' +
      '<td class="r">' + brewBy + '</td>' +
      '<td class="r">' + vel + '</td>' +
      '<td>' + trendIcon + '</td>' +
      '</tr>';

    // Detail row
    html += '<tr class="detail-row" id="detail' + idx + '"><td colspan="7">' + buildDetail(b) + '</td></tr>';
  });

  body.innerHTML = html;
}

function buildDetail(b){
  var h = '<div class="detail-panel"><div class="detail-grid">';

  // ── Column 1: Inventory & Timing ──
  h += '<div class="detail-section">';
  h += '<h4>Inventory & Timing</h4>';
  h += drow('Total Inv (bbl)', b.total_inv_bbl.toFixed(1));
  h += drow('Brewery Kegs (1/6)', b.brewery_kegs_sixth);
  h += drow('Brewery Kegs (1/2)', b.brewery_kegs_half);
  h += drow('Brewery Cases (16oz)', b.brewery_cases_16oz.toFixed(0));
  h += drow('Nappi Cases', b.nappi_cases);
  h += drow('Nappi Kegs', b.nappi_kegs);
  h += drow('Days to Stockout', b.days_until_stockout >= 900 ? '\u221e' : b.days_until_stockout);
  h += drow('Kegs Stockout', b.days_until_stockout_kegs === 0 ? '\u2014' : b.days_until_stockout_kegs + 'd');
  h += drow('Cases Stockout', b.days_until_stockout_cases === 0 ? '\u2014' : b.days_until_stockout_cases + 'd');
  h += drow('Lead Time', b.lead_time_days + ' days');
  h += drow('Brew By', b.brew_by_date || '\u2014');
  h += '</div>';

  // ── Column 2: Velocity & Channels ──
  h += '<div class="detail-section">';
  h += '<h4>Velocity & Channels</h4>';
  h += drow('Total Daily (bbl)', b.total_daily_bbl.toFixed(3));
  h += drow('Nappi', b.nappi_daily_bbl.toFixed(3) + ' bbl/d');
  h += drow('Toast', b.toast_daily_bbl.toFixed(3) + ' bbl/d');
  h += drow('Self-Distro', b.selfdistro_daily_bbl.toFixed(3) + ' bbl/d');
  h += drow('Current Mo Vel', b.current_month_velocity_bbl.toFixed(3) + ' bbl/d');
  if(b.same_month_last_year_bbl !== null){
    h += drow('Same Mo Last Yr', b.same_month_last_year_bbl.toFixed(3) + ' bbl/d');
  }
  h += drow('Trend (3mo)', b.trailing_3mo_trend);

  // Channel bar
  var cp = b.channel_pcts;
  h += '<div style="margin-top:8px">';
  h += '<div class="ch-bar">';
  if(cp.nappi > 0) h += '<div class="seg nappi" style="width:' + cp.nappi + '%"></div>';
  if(cp.toast > 0) h += '<div class="seg toast" style="width:' + cp.toast + '%"></div>';
  if(cp.selfdist > 0) h += '<div class="seg sd" style="width:' + cp.selfdist + '%"></div>';
  if(cp.mmm > 0) h += '<div class="seg mmm" style="width:' + cp.mmm + '%"></div>';
  h += '</div>';
  h += '<div class="ch-legend">';
  h += '<span><span class="dot" style="background:var(--accent)"></span>Nappi ' + cp.nappi + '%</span>';
  h += '<span><span class="dot" style="background:var(--orange)"></span>Toast ' + cp.toast + '%</span>';
  h += '<span><span class="dot" style="background:var(--blue)"></span>SD ' + (cp.selfdist||0) + '%</span>';
  h += '</div></div>';
  h += '</div>';

  // ── Column 3: Batch Plan & Sparkline ──
  h += '<div class="detail-section">';
  h += '<h4>Batch Plan</h4>';
  h += drow('Batch Size', b.batch_size_bbl + ' bbl (' + b.recommended_batch + ')');
  if(b.allocation){
    var a = b.allocation;
    h += drow('Kegs Output', a.kegs_output || '\u2014');
    h += drow('Cases Output', a.cases_output || '\u2014');
  }
  h += drow('Channels', (b.channels||[]).join(', '));

  // Sparkline from monthly_velocity
  if(b.monthly_velocity && b.monthly_velocity.length > 0){
    h += '<h4 style="margin-top:12px">Monthly Velocity</h4>';
    h += buildSparkline(b.monthly_velocity);
  }

  h += '</div>';

  h += '</div></div>'; // close detail-grid, detail-panel
  return h;
}

function drow(label, val){
  return '<div class="row"><span class="rlbl">' + label + '</span><span class="rval">' + val + '</span></div>';
}

function buildSparkline(mv){
  var maxV = Math.max.apply(null, mv.map(function(m){ return m.daily_kegs; }));
  if(maxV === 0) maxV = 1;
  var h = '<div class="spark">';
  mv.forEach(function(m, i){
    var ht = Math.max(2, Math.round((m.daily_kegs / maxV) * 28));
    var cls = i >= mv.length - 3 ? ' recent' : '';
    var title = m.month + ': ' + m.daily_kegs.toFixed(3) + ' bbl/d (' + m.qty_sold + ' units)';
    h += '<div class="bar' + cls + '" style="height:' + ht + 'px" title="' + title + '"></div>';
  });
  h += '</div>';
  // Label the last month
  var last = mv[mv.length - 1];
  h += '<div style="font-size:10px;color:var(--text3);margin-top:2px">' + last.month + ': ' + last.qty_sold + ' units</div>';
  return h;
}

function toggleDetail(tr, idx){
  var det = document.getElementById('detail' + idx);
  var wasOpen = det.classList.contains('show');
  // close all
  document.querySelectorAll('.detail-row.show').forEach(function(r){ r.classList.remove('show'); });
  document.querySelectorAll('tr.expanded').forEach(function(r){ r.classList.remove('expanded'); });
  if(!wasOpen){
    det.classList.add('show');
    tr.classList.add('expanded');
  }
}
</script>
